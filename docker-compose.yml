services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      STOCKFISH_PATH: /usr/games/stockfish
      PLYSHOCK_MODEL_PATH: /app/research/artifacts/models/best_model.joblib
      PLYSHOCK_FEATURE_SCHEMA_PATH: /app/research/data/processed/feature_schema_50k.json
    volumes:
      - ./research/artifacts/models:/app/research/artifacts/models:ro
      - ./research/data/processed:/app/research/data/processed:ro
      - ./research/artifacts/metrics:/app/research/artifacts/metrics:ro
      - ./research/artifacts/reports:/app/research/artifacts/reports:ro

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
